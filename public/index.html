// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function callClaude(system, messages) {
  const res = await fetch(`${PROXY_URL}/api/story`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200, system, messages }),
  });
  const data = await res.json();
  const text = data.content?.map(b => b.text||"").join("") || "";
  // Extract JSON robustly — find the outermost { } block
  const cleaned = text.replace(/```json|```/g,"").trim();
  const start = cleaned.indexOf("{");
  const end = cleaned.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("No JSON found in response");
  const jsonStr = cleaned.slice(start, end + 1);
  try {
    return JSON.parse(jsonStr);
  } catch(e) {
    // Try to salvage by replacing unescaped apostrophes inside string values
    const fixed = jsonStr.replace(/([":,\[\{]\s*")([^"]*?)'/g, (m,p1,p2) => p1+p2+"\'");
    return JSON.parse(fixed);
  }
}

// IMAGE VIA PROXY
// ═══════════════════════════════════════════════════════════
async function generateImage(prompt, proxyUrl, ageId) {
  const style = (ageId==="kids"||ageId==="young") ? "kids"
              : ageId==="teen" ? "teen" : "adult";
  const res = await fetch(`${PROXY_URL}/api/image`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, style }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.image;
}

function buildPrompt({ worldVibe, age, diff, party }) {
  return `You are CHRONICLE — the ultimate AI Game Master. Original fantasy worlds inspired by medieval epics, ancient history, Norse sagas, samurai tales. No copyrighted IP.

WORLD: ${worldVibe}
PARTY: ${party}
AGE: ${age.label} — ${age.note}
DIFFICULTY: ${diff.label} — ${diff.desc}

RULES:
- Write like a master novelist. Vivid scenes — sights, sounds, smells, dread or wonder.
- 3–5 sentences narration. Every word earns its place.
- NPCs have distinct voices and secrets. Make them memorable.
- Use party powers and personalities naturally in the narrative.
- End every scene at a tense decision point.
- Difficulty ${diff.id}: ${diff.id==="brutal"?"BAD CHOICES KILL. Real wounds, capture, death.":diff.id==="normal"?"Choices matter, mistakes cost.":"Story flows, make heroics feel earned."}
- Age ${age.id}: ${age.id==="kids"?"Safe, magical, wonder always wins.":age.id==="young"?"Adventure, light peril, heroism shines.":age.id==="teen"?"Real stakes, no explicit content.":"Full epic scope, no limits."}

Give 3 suggested actions. Each genuinely different — different approach, risk, angle. Write as what the player DOES. No labels, no icons, no prefixes.

Respond ONLY in this exact JSON (no markdown, no backticks). CRITICAL: Never use apostrophes or single quotes inside JSON string values — use the word "s" instead of apostrophe-s (e.g. "the warriors sword" not "the warrior's sword"). Use double quotes only:
{
  "scene_title": "Four Dramatic Words",
  "narration": "Rich 3-5 sentence narration.",
  "atmosphere": "One burning sensory detail.",
  "npc_name": "Name or null",
  "npc_dialogue": "Their words or null",
  "image_prompt": "Scene for painting, under 60 words, epic fantasy style, no names",
  "suggested_actions": ["action one","action two","action three"],
  "consequences_hint": "What hangs in the balance",
  "is_ending": false
}`;
}

function Scene({ scene, isLatest, onAction, loading }) {
  const [custom, setCustom] = useState("");
  const [showCustom, setShowCustom] = useState(false);

  const submit = () => {
    if (custom.trim()) { onAction(custom.trim()); setCustom(""); setShowCustom(false); }
  };

  return (
    <div style={{
      background:isLatest?T.bgCard:"rgba(255,150,50,0.03)",
      border:`1.5px solid ${isLatest?T.border:T.borderDim}`,
      borderRadius:20, overflow:"hidden",
      opacity:isLatest?1:0.4, marginBottom:20,
      animation:isLatest?"fadeUp 0.5s ease":"none",
      boxShadow:isLatest?`0 6px 48px rgba(0,0,0,0.6)`:"none",
    }}>

      {/* Image fades in — never blocks */}


      {/* Scene image - loads via proxy in background */}
      {scene.imageLoading && !scene.imageUrl && (
        <div style={{
          padding:"10px 18px", background:"rgba(240,192,64,0.04)",
          borderBottom:`1px solid rgba(240,192,64,0.08)`,
          display:"flex", alignItems:"center", gap:8,
        }}>
          <span style={{animation:"flicker 1.5s ease-in-out infinite", fontSize:15}}>🎨</span>
          <span style={{color:T.textDark, fontSize:13, letterSpacing:1}}>Painting the scene...</span>
        </div>
      )}
      {scene.imageError && (
        <div style={{
          padding:"10px 18px", background:"rgba(180,40,40,0.15)",
          borderBottom:`1px solid rgba(200,60,60,0.3)`,
          fontSize:13, color:"#ff9090",
        }}>
          🖼️ Image error: {scene.imageError}
        </div>
      )}
      {scene.imageUrl && (
        <div style={{position:"relative"}}>
          <img src={scene.imageUrl} alt="" style={{
            width:"100%", display:"block", aspectRatio:"16/9", objectFit:"cover",
            animation:"fadeIn 1s ease",
          }}/>
          <div style={{
            position:"absolute", bottom:0, left:0, right:0, height:80,
            background:"linear-gradient(transparent, rgba(20,0,0,0.98))",
          }}/>
        </div>
      )}

      <div style={{padding:"24px 26px"}}>

        {/* Past choice */}
        {scene.chosenAction && (
          <div style={{
            fontSize:15, color:T.textDark, marginBottom:14, fontStyle:"italic",
            paddingBottom:12, borderBottom:`1px solid rgba(240,192,64,0.1)`,
          }}>
            ✦ You chose: "{scene.chosenAction}"
          </div>
        )}

        {/* Title */}
        <h3 style={{
          color:T.goldLight, fontSize:24, margin:"0 0 6px",
          fontWeight:900, letterSpacing:3, textTransform:"uppercase", fontFamily:T.font,
        }}>{scene.scene_title}</h3>

        {/* Atmosphere */}
        {scene.atmosphere && (
          <div style={{color:T.textDark, fontSize:16, fontStyle:"italic", marginBottom:14, lineHeight:1.6}}>
            {scene.atmosphere}
          </div>
        )}

        {/* Narration */}
        <p style={{
          color:T.textMain, fontSize:19, lineHeight:2.0, margin:"0 0 18px", fontFamily:T.font,
        }}>{scene.narration}</p>

        {/* NPC */}
        {scene.npc_dialogue && (
          <div style={{
            borderLeft:`4px solid ${T.gold}`, marginBottom:18,
            background:"rgba(240,192,64,0.06)", borderRadius:"0 12px 12px 0",
            padding:"14px 18px",
          }}>
            {scene.npc_name && (
              <div style={{color:T.gold, fontSize:14, fontWeight:"bold", letterSpacing:3, textTransform:"uppercase", marginBottom:6}}>
                {scene.npc_name}

            )}
            <div style={{color:T.textSub, fontStyle:"italic", fontSize:18, lineHeight:1.7}}>

          </div>
        )}

        {/* Consequences */}
        {scene.consequences_hint && isLatest && (
          <div style={{color:T.textDark, fontSize:15, fontStyle:"italic", marginBottom:18, textAlign:"center"}}>
            ⚠ {scene.consequences_hint}
          </div>
        )}

        {/* Actions */}
        {isLatest && !loading && (
          <div>
            <div style={{color:T.textDark, fontSize:13, letterSpacing:4, textTransform:"uppercase", marginBottom:12, textAlign:"center"}}>
              ✦ What do you do? ✦
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              {scene.suggested_actions?.map((act,i) => (
                <button key={i} onClick={()=>onAction(act)} style={{
                  background:"rgba(240,192,64,0.06)",
                  border:`1.5px solid rgba(240,192,64,0.25)`,
                  borderRadius:14, padding:"15px 20px",
                  color:T.textMain, fontFamily:T.font, fontSize:17,

                  transition:"all 0.15s", lineHeight:1.5,

              {/* Free text */}
              {!showCustom ? (
                <button onClick={()=>setShowCustom(true)} style={{
                  background:"transparent",
                  border:`1.5px dashed rgba(240,192,64,0.2)`,
                  borderRadius:14, padding:"13px 20px",
                  color:T.textDark, fontFamily:T.font, fontSize:16,
                  cursor:"pointer", textAlign:"left", transition:"all 0.15s",
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=T.gold;e.currentTarget.style.color=T.gold;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(240,192,64,0.2)";e.currentTarget.style.color=T.textDark;}}

              ) : (
                <div style={{border:`2px solid ${T.gold}`, borderRadius:14, overflow:"hidden"}}>
                  <textarea autoFocus value={custom}
                    onChange={e=>setCustom(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),submit())}
                    placeholder="Describe exactly what you do..."
                    style={{
                      width:"100%", padding:"14px 16px",
                      background:"rgba(240,192,64,0.05)", border:"none",
                      color:T.textMain, fontSize:17, fontFamily:T.font,
                      resize:"none", outline:"none", minHeight:70,
                      boxSizing:"border-box", lineHeight:1.6,
                    }}/>
                  <div style={{display:"flex", gap:8, padding:"10px 14px",
                    background:"rgba(0,0,0,0.4)", borderTop:`1px solid rgba(240,192,64,0.15)`}}>
                    <button onClick={submit} style={{
                      background:T.gold, color:"#1a0000", border:"none",
                      borderRadius:8, padding:"7px 20px", fontSize:15,
                      fontFamily:T.font, cursor:"pointer", fontWeight:"bold",
                    }}>Do it →</button>
                    <button onClick={()=>{setShowCustom(false);setCustom("");}} style={{
                      background:"transparent", color:T.textDark, border:"none",
                      fontSize:15, cursor:"pointer", fontFamily:T.font,
                    }}>Cancel</button>
                    <span style={{color:"#4a2010", fontSize:13, alignSelf:"center", marginLeft:"auto"}}>Enter to submit</span>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Auto-summarise when history gets long (every 10 scenes)
const SUMMARISE_EVERY = 10;

async function summariseHistory(history, systemPrompt) {
  const summariseMsg = `Summarise everything that has happened in the adventure so far in 150 words maximum. Include: key events, important NPCs met, decisions made, current situation. Write it as a compact story recap that preserves all narrative context. Start with "STORY SO FAR:"`;
  const res = await fetch(`${PROXY_URL}/api/story`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      system: systemPrompt,
      messages: [...history, {role:"user", content:summariseMsg}],
    }),
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||"").join("") || "";
}

function Adventure({ cfg, onRestart }) {
  const [scenes, setScenes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [summarising, setSummarising] = useState(false);
  const [summary, setSummary] = useState(null); // current compressed summary
  const history = useRef([]);
  const sceneCount = useRef(0);
  const bottomRef = useRef(null);
  const sys = buildPrompt({ worldVibe:cfg.vibe, age:cfg.age, diff:cfg.diff, party:cfg.party });

  const compressHistory = async () => {
    if (history.current.length < 6) return; // nothing to compress yet
    setSummarising(true);
    try {
      const newSummary = await summariseHistory(history.current, sys);
      // Replace full history with a single summary message
      history.current = [{
        role: "user",
        content: `${newSummary}

Continue the adventure from this point.`
      }, {
        role: "assistant",
        content: JSON.stringify({scene_title:"Story Continues", narration:"The chronicle continues...", suggested_actions:[]})
      }];
      setSummary(newSummary);
    } catch(e) {
      console.warn("Summarisation failed:", e.message);
    }
    setSummarising(false);
  };

  const next = async (choice=null) => {
    setLoading(true); setError(null);
    try {
      // Auto-compress every N scenes
      sceneCount.current += 1;
      if (sceneCount.current > 1 && sceneCount.current % SUMMARISE_EVERY === 0) {
        await compressHistory();
      }

      const msg = choice
        ? `The party acted: "${choice}". Continue the story.`
        : `Open the adventure. Immediately draw the party into something urgent. Establish the world through action, not exposition.`;
      history.current = [...history.current, {role:"user", content:msg}];
      const scene = await callClaude(sys, history.current);
      history.current = [...history.current, {role:"assistant", content:JSON.stringify(scene)}];
      const s = {...scene, chosenAction:choice, id:Date.now(), imageUrl:null, imageLoading:!!cfg.proxyUrl};
      setScenes(p=>[...p,s]);
      setLoading(false);

      // Generate scene image via proxy if configured
      if (cfg.proxyUrl && scene.image_prompt) {
        generateImage(scene.image_prompt, cfg.proxyUrl, cfg.age?.id)
          .then(url => setScenes(p=>p.map(x=>x.id===s.id?{...x,imageUrl:url,imageLoading:false}:x)))
          .catch(err => setScenes(p=>p.map(x=>x.id===s.id?{...x,imageLoading:false,imageError:err.message}:x)));
      }
    } catch(e) {
      setError("The chronicle was disrupted: "+e.message);
      setLoading(false);
    }
  };

  useEffect(()=>{next();},[]);
  useEffect(()=>{setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),200);},[scenes,loading]);

  return (
    <div style={{minHeight:"100vh", background:T.bgPage, fontFamily:T.font, color:T.textMain}}>

      {/* Top bar */}
      <div style={{
        position:"sticky", top:0, zIndex:10,
        background:"rgba(60,0,0,0.97)", backdropFilter:"blur(14px)",
        borderBottom:`1.5px solid ${T.border}`,
        padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between",
      }}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <span style={{fontSize:22}}>⚔️</span>
          <div>
            <div style={{color:T.goldLight, fontSize:17, fontWeight:"bold", letterSpacing:1}}>
              {cfg.world?.emoji} {cfg.world?.name}
            </div>
            <div style={{color:T.textDark, fontSize:13, letterSpacing:1}}>
              {cfg.age?.label} · {cfg.diff?.label} · Scene {scenes.length}
              {scenes.length >= 5 && !summary && (
                <span style={{color:"#7a4020", marginLeft:8, fontSize:11}}>
                  ~{Math.round(scenes.length * 1000).toLocaleString()} tokens
                </span>
              )}
            </div>
          </div>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          {cfg.chars?.map(c=>(
            <span key={c.id} title={c.n} style={{fontSize:20}}>{c.e}</span>
          ))}
          {scenes.length >= 6 && !summarising && !loading && (
            <button onClick={compressHistory} title="Compress story history to save tokens" style={{
              background:"rgba(240,192,64,0.08)", color:T.textDark,
              border:`1px solid ${T.borderDim}`, borderRadius:8,
              padding:"4px 10px", fontSize:12, fontFamily:T.font, cursor:"pointer",
            }}>📜 Compress</button>
          )}
          {summarising && (
            <div style={{fontSize:13, color:T.gold, animation:"flicker 1.5s infinite", marginRight:4}}>
              📜 Compressing...
            </div>
          )}
          {summary && !summarising && (
            <div title={summary} style={{
              fontSize:12, color:T.textDark, cursor:"help",
              border:`1px solid ${T.borderDim}`, borderRadius:8,
              padding:"3px 9px", marginRight:4,
            }}>📜 History compressed</div>
          )}
          <button onClick={onRestart} style={{
            background:"rgba(255,100,50,0.08)", color:T.textMuted,
            border:`1px solid ${T.borderDim}`, borderRadius:10,
            padding:"6px 14px", fontSize:14, fontFamily:T.font, cursor:"pointer", marginLeft:4,
          }}>New Game</button>
        </div>
      </div>

      {/* Party strip */}
      {cfg.chars?.length>0 && (
        <div style={{maxWidth:660, margin:"16px auto 0", padding:"0 16px"}}>
          <div style={{
            background:"rgba(240,192,64,0.06)", border:`1px solid ${T.borderDim}`,
            borderRadius:14, padding:"12px 16px", display:"flex", gap:14, flexWrap:"wrap",
          }}>
            {cfg.chars.map(c=>(
              <div key={c.id} style={{display:"flex", alignItems:"center", gap:8}}>
                <div style={{
                  width:44, height:44, borderRadius:8, flexShrink:0,
                  background: CHAR_STYLE[c.id]?.bg || T.bgCard,
                  border:`1.5px solid ${CHAR_STYLE[c.id]?.accent||T.gold}`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:22,
                }}>{c.e}</div>
                <div>
                  <div style={{color:T.gold, fontSize:14, fontWeight:"bold"}}>{c.n}</div>
                  <div style={{color:T.textDark, fontSize:12}}>✦ {c.power}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Scenes */}
      <div style={{maxWidth:660, margin:"18px auto 0", padding:"0 16px 64px"}}>
        {scenes.map((s,i)=>(
          <Scene key={s.id} scene={s} isLatest={i===scenes.length-1} onAction={next} loading={loading}/>
        ))}

        {loading && (
          <div style={{
            background:T.bgCard, borderRadius:20, padding:"52px 24px",
            textAlign:"center", border:`1.5px solid ${T.borderDim}`,
          }}>
            <div style={{fontSize:40, marginBottom:12, animation:"flicker 2s ease-in-out infinite"}}>🔮</div>
            <div style={{color:T.gold, fontSize:17, letterSpacing:4, textTransform:"uppercase"}}>
              The Chronicle Unfolds...
            </div>
          </div>
        )}

        {error && (
          <div style={{
            background:"rgba(180,40,40,0.12)", borderRadius:16, padding:"20px",
            textAlign:"center", border:"1.5px solid rgba(200,60,60,0.4)",
          }}>
            <div style={{color:"#ff9090", marginBottom:12, fontSize:16}}>{error}</div>
            <button onClick={()=>next(scenes.at(-1)?.chosenAction)} style={{
              background:T.gold, color:"#1a0000", border:"none", borderRadius:10,
              padding:"9px 24px", cursor:"pointer", fontFamily:T.font, fontWeight:"bold", fontSize:16,
            }}>Try Again</button>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes flicker{0%,100%{opacity:1}50%{opacity:0.25}}
      `}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
function Chronicle() {
  const [cfg, setCfg] = useState(null);
  if (!cfg) return <Setup onStart={setCfg}/>;
  return <Adventure cfg={cfg} onRestart={()=>setCfg(null)}/>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<Chronicle/>);

  </script>
</body>
</html>
